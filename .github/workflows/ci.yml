# Build + test on every push to master and every PR.
# Keeps the door open for "next submitter has something to pass".

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: dotnet build (root project — catches greedy-glob regressions)
        run: dotnet build h.csproj -c Release
      - name: dotnet test
        run: dotnet test test/h.Tests --logger "console;verbosity=normal"
